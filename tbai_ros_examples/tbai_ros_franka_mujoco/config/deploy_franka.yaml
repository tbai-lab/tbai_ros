robot_name: 'arm'

joint_names: ["panda_joint1", "panda_joint2", "panda_joint3", "panda_joint4", "panda_joint5", "panda_joint6", "panda_joint7"]
base_name: "panda_link0"

state_topic: "arm/state"
command_topic: "arm/command"
change_controller_topic: "arm/change_controller"

fixed_base: true

reference_generator:
  type: twist
  twist:
    topic: "/cmd_vel"

static_controller:
  stand_controller:
    joint_angles: [0.0, -0.785, 0.0, -2.356, 0.0, 1.571, 0.785]
  sit_controller:
    joint_angles: [0.0, 0.0, 0.0, -1.571, 0.0, 1.571, -0.785]
  kp: 400
  kd: 40
  interpolation_time: 2.0
  rate: 50

mpc_controller:
  wbc_type: "hqp"
  rate: 400
  reference_trajectory:
    reference_topic: "/arm_mpc_target"
    observation_topic: "/arm_mpc_observation"

estimator_type: "ground_truth"
